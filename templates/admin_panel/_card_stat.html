<div class="col-6 col-md-3">
  <div class="card border-0 text-center py-3" style="background:#1a2c45;">
    <div class="card-body p-2">
      <i class="bi {{ icone }} fs-2 text-{{ couleur }}"></i>
      <div class="text-white fw-bold fs-3 mt-1" id="stat-{{ label|slugify }}">{{ valeur }}</div>
      <div class="text-white small fw-semibold">{{ label }}</div>
      <div class="text-secondary" style="font-size:.75rem;">{{ sous_label }}</div>
    </div>
  </div>
</div>
